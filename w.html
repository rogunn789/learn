<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>单词记忆 - 概率均衡版 v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000000; color: #ffffff; }
        body { font-family: 'Noto Serif JP', serif; }
        [v-cloak] { display: none; }
        .theme-text { color: #f3f4f6; transition: color 0.3s ease; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        /* 禁止按钮双击放大，提高响应速度 */
        button, input { touch-action: manipulation; }
    </style>
</head>
<body>

    <div id="app" v-cloak class="h-full w-full flex flex-col items-center justify-center p-4 box-border relative">
         
        <button @click="speakSentence" 
                v-if="currentSentence && !loading && !needManualUpload"
                class="absolute top-4 left-4 md:top-8 md:left-8 w-12 h-12 flex items-center justify-center rounded-full bg-gray-800 hover:bg-gray-700 text-gray-100 transition-colors shadow-sm z-10">
            <i class="fa-solid fa-volume-high text-xl"></i>
        </button>

        <button @click="showSearch = true" 
                class="absolute top-4 right-4 md:top-8 md:right-8 w-12 h-12 flex items-center justify-center rounded-full bg-gray-800 hover:bg-gray-700 text-gray-100 transition-colors shadow-sm z-10">
            <i class="fa-solid fa-magnifying-glass text-xl"></i>
        </button>

        <div v-if="showSearch" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex justify-center items-start z-50 pt-16 md:pt-24" @click.self="closeSearch">
            <div class="bg-gray-900 w-11/12 max-w-2xl rounded-xl shadow-2xl flex flex-col max-h-[75vh] overflow-hidden border border-gray-700 transform transition-all">
                <div class="p-4 border-b border-gray-700 flex items-center gap-3 bg-gray-800">
                    <i class="fa-solid fa-magnifying-glass text-gray-500"></i>
                    <input ref="searchInput" v-model="searchQuery" type="text" placeholder="搜索关键字..." class="w-full text-lg bg-transparent border-none focus:outline-none text-white placeholder-gray-500" @keyup.esc="closeSearch">
                    <button @click="closeSearch" class="text-gray-500 hover:text-white px-2 text-xl">&times;</button>
                </div>
                <div class="overflow-y-auto flex-grow p-2">
                    <div v-if="!searchQuery" class="text-gray-600 text-center py-10">输入关键字检索全文</div>
                    <div v-else-if="searchResults.length === 0" class="text-gray-600 text-center py-10">未找到包含该关键字的句子</div>
                    <div v-else class="flex flex-col gap-1">
                        <div v-for="(item, index) in searchResults" :key="index" @click="selectSentence(item)" class="p-4 rounded-lg hover:bg-gray-800 cursor-pointer transition-colors border-b border-gray-800 last:border-0 text-gray-200" v-html="highlightText(item, searchQuery)"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full max-w-lg h-full flex flex-col py-2">
            <div class="flex justify-center items-center space-x-12 mb-4 text-xl font-bold tracking-widest shrink-0">
                <div class="flex flex-col items-center">
                    <span class="text-green-500">{{ countClear }}</span>
                    <span class="text-[10px] text-gray-500">清晰>模糊</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-yellow-500">{{ countBlurry }}</span>
                    <span class="text-[10px] text-gray-500">模糊≥清晰</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-red-500">{{ countUnread }}</span>
                    <span class="text-[10px] text-gray-500">未背过</span>
                </div>
            </div>

            <div class="p-6 flex-grow flex flex-col rounded-xl overflow-hidden">
                <template v-if="loading">
                    <div class="flex-grow flex items-center justify-center"><span>古卷加载中...</span></div>
                </template>
                <template v-else-if="needManualUpload">
                    <div class="flex-grow flex flex-col items-center justify-center text-center">
                        <label class="cursor-pointer bg-gray-800 hover:bg-gray-700 border border-gray-600 py-2 px-6 rounded-md transition text-white">
                            开启 w.txt 文件
                            <input type="file" class="hidden" accept=".txt" @change="handleFileUpload">
                        </label>
                    </div>
                </template>
                <template v-else>
                    <div class="flex-grow flex items-center justify-center py-2 overflow-hidden">
                        <p class="text-white text-xl md:text-2xl font-bold text-center leading-relaxed break-words whitespace-pre-wrap">
                            {{ currentSentence }}
                        </p>
                    </div>
                    <div class="grid grid-cols-2 gap-8 mt-4 shrink-0">
                        <button @click="handleAnswer('Simple')" class="flex flex-col items-center p-3 text-green-500 hover:bg-gray-800 rounded-xl transition-all">
                            <i class="fa-solid fa-leaf text-3xl mb-1"></i>
                            <span class="text-xs font-bold">简单</span>
                        </button>
                        <button @click="handleAnswer('Blur')" class="flex flex-col items-center p-3 text-yellow-500 hover:bg-gray-800 rounded-xl transition-all">
                            <i class="fa-solid fa-cloud text-3xl mb-1"></i>
                            <span class="text-xs font-bold">模糊</span>
                        </button>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;

        // --- IndexedDB 存储逻辑 ---
        const DB_NAME = 'VocabAppDB';
        const STORE_NAME = 'records';
        const initDB = () => {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
            });
        };

        const getRecordsFromDB = async (db) => {
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => {
                    const data = {};
                    req.result.forEach(item => { data[item.id] = item; });
                    resolve(data);
                };
            });
        };

        const saveRecordToDB = async (db, id, record) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.put({ id, ...record });
        };

        createApp({
            setup() {
                const db = ref(null);
                const sentences = ref([]);
                const records = ref({}); 
                const currentSentenceObj = ref(null);
                const loading = ref(true);
                const needManualUpload = ref(false);
                const showSearch = ref(false);
                const searchQuery = ref('');
                const searchInput = ref(null);

                // --- 修改后的统计逻辑 ---
                // 1. 清晰(简单)次数 > 模糊次数 的句子
                const countClear = computed(() => {
                    return sentences.value.filter(s => {
                        const r = records.value[s];
                        return r && (r.simpleCount + r.blurCount > 0) && (r.simpleCount > r.blurCount);
                    }).length;
                });

                // 2. 模糊次数 >= 清晰次数 的句子 (已背过)
                const countBlurry = computed(() => {
                    return sentences.value.filter(s => {
                        const r = records.value[s];
                        return r && (r.simpleCount + r.blurCount > 0) && (r.blurCount >= r.simpleCount);
                    }).length;
                });

                // 3. 剩下没背过的
                const countUnread = computed(() => {
                    return sentences.value.filter(s => {
                        const r = records.value[s];
                        return !r || (r.simpleCount + r.blurCount === 0);
                    }).length;
                });

                const currentSentence = computed(() => currentSentenceObj.value || '');

                watch(showSearch, (newVal) => {
                    if (newVal) {
                        nextTick(() => { if (searchInput.value) searchInput.value.focus(); });
                    }
                });

                const searchResults = computed(() => {
                    const q = searchQuery.value.trim().toLowerCase();
                    if (!q) return [];
                    return sentences.value.filter(s => s.toLowerCase().includes(q)).slice(0, 100);
                });

                const highlightText = (text, query) => {
                    if (!text) return '';
                    let cleanQuery = query.trim();
                    if (!cleanQuery) return text;
                    const escapeHtml = (str) => str.replace(/[&<>"']/g, m => ({
                        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                    })[m]);
                    let escapedText = escapeHtml(text);
                    let escapedQuery = escapeHtml(cleanQuery);
                    const safeRegexQuery = escapedQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp(`(${safeRegexQuery})`, 'gi');
                    return escapedText.replace(regex, '<span class="bg-yellow-500 text-black font-bold px-1 rounded">$1</span>');
                };

                const closeSearch = () => { showSearch.value = false; searchQuery.value = ''; };
                const selectSentence = (sentence) => { currentSentenceObj.value = sentence; closeSearch(); };

                const pickNextSentence = () => {
                    if (sentences.value.length === 0) return;
                    const now = Date.now();
                    const rand = Math.random();
                    let next = null;

                    const dataList = sentences.value.map(s => {
                        const r = records.value[s] || { simpleCount: 0, blurCount: 0, lastTime: 0 };
                        return { text: s, ...r };
                    });

                    if (rand < 0.2) {
                        const unread = dataList.filter(d => d.simpleCount === 0 && d.blurCount === 0 && d.text !== currentSentence.value);
                        if (unread.length > 0) next = unread[Math.floor(Math.random() * unread.length)].text;
                    } 
                    
                    if (!next && rand < 0.7) { 
                        const blurPool = dataList
                            .filter(d => d.blurCount > 0 && d.text !== currentSentence.value && (now - d.lastTime > 30000))
                            .sort((a, b) => b.blurCount - a.blurCount)
                            .slice(0, 10);
                        if (blurPool.length > 0) next = blurPool[Math.floor(Math.random() * blurPool.length)].text;
                    }

                    if (!next && rand < 1.0) { 
                        const simplePool = dataList
                            .filter(d => d.simpleCount > 0 && d.text !== currentSentence.value && (now - d.lastTime > 60000))
                            .sort((a, b) => a.simpleCount - b.simpleCount)
                            .slice(0, 10);
                        if (simplePool.length > 0) next = simplePool[Math.floor(Math.random() * simplePool.length)].text;
                    }

                    if (!next) {
                        const fallbackPool = sentences.value.filter(s => s !== currentSentence.value);
                        next = fallbackPool.length > 0 ? fallbackPool[Math.floor(Math.random() * fallbackPool.length)] : sentences.value[0];
                    }
                    currentSentenceObj.value = next;
                };

                const handleAnswer = async (type) => {
                    const s = currentSentence.value;
                    if (!s) return;
                    if (!records.value[s]) records.value[s] = { simpleCount: 0, blurCount: 0, lastTime: 0 };
                    if (type === 'Simple') records.value[s].simpleCount++;
                    else records.value[s].blurCount++;
                    records.value[s].lastTime = Date.now();
                    if (db.value) await saveRecordToDB(db.value, s, records.value[s]);
                    pickNextSentence();
                };

                const parseText = (text) => {
                    const blocks = text.split(/\n\s*\n/).map(b => b.trim()).filter(b => b.length > 0);
                    sentences.value = blocks;
                    if (sentences.value.length > 0) pickNextSentence();
                    loading.value = false;
                    needManualUpload.value = false;
                };

                const initData = async () => {
                    db.value = await initDB();
                    records.value = await getRecordsFromDB(db.value);
                    try {
                        const res = await fetch('w.txt?_=' + Date.now(), { cache: 'no-store' });
                        if (!res.ok) throw new Error();
                        const text = await res.text();
                        parseText(text);
                    } catch (e) {
                        needManualUpload.value = true;
                        loading.value = false;
                    }
                };

                const handleFileUpload = (event) => {
                    const file = event.target.files[0];
                    if (!file) return;
                    loading.value = true;
                    const reader = new FileReader();
                    reader.onload = (e) => parseText(e.target.result);
                    reader.readAsText(file);
                };

                const speakSentence = () => {
                    if (!currentSentence.value) return;
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(currentSentence.value);
                    u.lang = 'ja-JP';
                    window.speechSynthesis.speak(u);
                };

                onMounted(() => initData());

                return {
                    loading, needManualUpload, currentSentence,
                    countClear, countBlurry, countUnread,
                    handleAnswer, handleFileUpload, speakSentence,
                    showSearch, searchQuery, searchResults, searchInput,
                    closeSearch, selectSentence, highlightText
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
