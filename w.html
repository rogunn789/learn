<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>文本块记忆 - SuperMemo优化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000000; color: #ffffff; }
        body { font-family: 'Noto Serif JP', serif; }
        [v-cloak] { display: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
        button, input { touch-action: manipulation; }
    </style>
</head>
<body>

    <div id="app" v-cloak class="h-full w-full flex flex-col items-center justify-center p-4 box-border relative">
         
        <button @click="speakBlock" 
                v-if="currentBlock && !loading && !needManualUpload"
                class="absolute top-4 left-4 md:top-8 md:left-8 w-12 h-12 flex items-center justify-center rounded-full bg-gray-800 hover:bg-gray-700 text-gray-100 transition-colors shadow-sm z-10">
            <i class="fa-solid fa-volume-high text-xl"></i>
        </button>

        <button @click="showSearch = true" 
                class="absolute top-4 right-4 md:top-8 md:right-8 w-12 h-12 flex items-center justify-center rounded-full bg-gray-800 hover:bg-gray-700 text-gray-100 transition-colors shadow-sm z-10">
            <i class="fa-solid fa-magnifying-glass text-xl"></i>
        </button>

        <div v-if="showSearch" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex justify-center items-start z-50 pt-16 md:pt-24" @click.self="closeSearch">
            <div class="bg-gray-900 w-11/12 max-w-2xl rounded-xl shadow-2xl flex flex-col max-h-[75vh] overflow-hidden border border-gray-700 transform transition-all">
                <div class="p-4 border-b border-gray-700 flex items-center gap-3 bg-gray-800">
                    <i class="fa-solid fa-magnifying-glass text-gray-500"></i>
                    <input ref="searchInput" v-model="searchQuery" type="text" placeholder="输入关键字精准搜索 (如 ABC)..." class="w-full text-lg bg-transparent border-none focus:outline-none text-white placeholder-gray-500" @keyup.esc="closeSearch">
                    <button @click="closeSearch" class="text-gray-500 hover:text-white px-2 text-2xl leading-none">&times;</button>
                </div>
                <div class="overflow-y-auto flex-grow p-2">
                    <div v-if="searchQuery.trim()" class="flex flex-col gap-1">
                        <div v-for="(item, index) in searchResults" :key="index" 
                             @click="selectBlock(item)" 
                             class="p-4 rounded-lg hover:bg-gray-800 cursor-pointer transition-colors border-b border-gray-800 last:border-0 text-gray-300 text-base active:bg-gray-700" 
                             v-html="highlightText(item, searchQuery)">
                        </div>
                        <div v-if="searchResults.length === 0" class="text-gray-500 text-center py-10">未找到包含该关键字的文本块</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full max-w-lg h-full flex flex-col py-2">
            <div class="flex justify-center items-center space-x-16 mb-6 text-2xl md:text-3xl font-bold tracking-widest shrink-0">
                <span class="text-green-500" title="已掌握 (n>0)">{{ countClear }}</span>
                <span class="text-yellow-500" title="需复习 (n=0)">{{ countBlurry }}</span>
                <span class="text-red-500" title="未学习">{{ countUnread }}</span>
            </div>

            <div class="p-6 flex-grow flex flex-col rounded-xl overflow-hidden">
                <template v-if="loading">
                    <div class="flex-grow flex items-center justify-center text-gray-400"><span>古卷加载中...</span></div>
                </template>
                <template v-else-if="needManualUpload">
                    <div class="flex-grow flex flex-col items-center justify-center text-center">
                        <label class="cursor-pointer bg-gray-800 hover:bg-gray-700 border border-gray-600 py-3 px-8 rounded-md transition text-white shadow-lg">
                            开启 w.txt 文件
                            <input type="file" class="hidden" accept=".txt" @change="handleFileUpload">
                        </label>
                    </div>
                </template>
                <template v-else>
                    <div class="flex-grow flex items-center justify-center py-2 overflow-scroll">
                        <p class="text-white text-xl md:text-2xl font-bold text-center leading-relaxed break-words whitespace-pre-wrap"　style="height: 100% !important;"    >
                            {{ currentBlock }}
                        </p>
                    </div>
                    <div class="grid grid-cols-2 gap-8 mt-4 shrink-0">
                        <button @click="handleAnswer('Simple')" class="flex flex-col items-center p-4 text-green-500 hover:bg-gray-800 rounded-xl transition-all active:scale-95">
                            <i class="fa-solid fa-leaf text-4xl mb-2"></i>
                            <span class="text-sm font-bold tracking-widest">简单</span>
                        </button>
                        <button @click="handleAnswer('Blur')" class="flex flex-col items-center p-4 text-yellow-500 hover:bg-gray-800 rounded-xl transition-all active:scale-95">
                            <i class="fa-solid fa-cloud text-4xl mb-2"></i>
                            <span class="text-sm font-bold tracking-widest">模糊</span>
                        </button>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;

        const DB_NAME = 'VocabAppDB';
        const STORE_NAME = 'records';
        const initDB = () => {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
            });
        };

        const getRecordsFromDB = async (db) => {
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => {
                    const data = {};
                    req.result.forEach(item => { data[item.id] = item; });
                    resolve(data);
                };
            });
        };

        const saveRecordToDB = async (db, id, record) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.put({ id, ...record });
        };

        const cleanupDB = async (db, validBlocks) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            const req = store.getAllKeys();
            req.onsuccess = () => {
                const keys = req.result;
                const validSet = new Set(validBlocks);
                keys.forEach(key => {
                    if (!validSet.has(key)) {
                        store.delete(key);
                    }
                });
            };
        };

        const shuffleArray = (array) => {
            let currentIndex = array.length, randomIndex;
            while (currentIndex > 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        };

        createApp({
            setup() {
                const db = ref(null);
                const blocks = ref([]);     
                const records = ref({}); 
                const queue = ref([]); 
                const currentBlockObj = ref(null);
                const loading = ref(true);
                const needManualUpload = ref(false);
                const showSearch = ref(false);
                const searchQuery = ref('');
                const searchInput = ref(null);

                // 根据 SM-2 算法更新统计逻辑
                const countClear = computed(() => blocks.value.filter(b => {
                    const r = records.value[b];
                    return r && r.n > 0; // n>0 代表已跨过第一级记忆门槛
                }).length);

                const countBlurry = computed(() => blocks.value.filter(b => {
                    const r = records.value[b];
                    // n=0 代表正在重学，且曾经学过
                    return r && r.n === 0 && (r.simpleCount > 0 || r.blurCount > 0);
                }).length);

                const countUnread = computed(() => blocks.value.filter(b => {
                    const r = records.value[b];
                    return !r || (r.simpleCount === 0 && r.blurCount === 0);
                }).length);

                const currentBlock = computed(() => currentBlockObj.value || '');

                watch(showSearch, (newVal) => {
                    if (newVal) {
                        nextTick(() => { if (searchInput.value) searchInput.value.focus(); });
                    }
                });

                const searchResults = computed(() => {
                    const q = searchQuery.value.trim().toLowerCase();
                    if (!q) return [];
                    return blocks.value.filter(b => b.toLowerCase().includes(q)).slice(0, 100);
                });

                const highlightText = (text, query) => {
                    if (!text) return '';
                    let cleanQuery = query.trim();
                    if (!cleanQuery) return text;
                    const escapeHtml = (str) => str.replace(/[&<>"']/g, m => ({
                        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                    })[m]);
                    let escapedText = escapeHtml(text);
                    let escapedQuery = escapeHtml(cleanQuery);
                    const safeRegexQuery = escapedQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp(`(${safeRegexQuery})`, 'gi');
                    return escapedText.replace(regex, '<span class="bg-yellow-500 text-black font-bold px-1 rounded shadow-sm">$1</span>');
                };

                const closeSearch = () => { showSearch.value = false; searchQuery.value = ''; };
                const selectBlock = (block) => { 
                    currentBlockObj.value = block; 
                    closeSearch(); 
                    queue.value = []; 
                };

                // --- 核心算法：SuperMemo 到期抽取逻辑 ---
                const pickNextBlock = () => {
                    if (blocks.value.length === 0) return;

                    if (queue.value.length > 0) {
                        currentBlockObj.value = queue.value.shift();
                        return;
                    }

                    const now = Date.now();
                    const dataList = blocks.value.map(b => {
                        let r = records.value[b] || { simpleCount: 0, blurCount: 0, lastTime: 0 };
                        // 兼容旧数据结构，初始化 SM-2 字段
                        if (r.EF === undefined) {
                            r.EF = 2.5; 
                            r.n = (r.simpleCount > r.blurCount) ? 1 : 0; 
                            r.interval = 1; 
                            r.nextReviewTime = r.lastTime || 0;
                        }
                        return { text: b, ...r };
                    });

                    // 1. 已到期池 (按超期时间最久排序)
                    let duePool = dataList
                        .filter(d => (d.simpleCount > 0 || d.blurCount > 0) && d.nextReviewTime <= now)
                        .sort((a, b) => a.nextReviewTime - b.nextReviewTime);

                    // 2. 未学习池
                    let newPool = shuffleArray(dataList.filter(d => d.simpleCount === 0 && d.blurCount === 0));

                    // 3. 未到期池 (作为无牌可抽时的兜底)
                    let futurePool = dataList
                        .filter(d => (d.simpleCount > 0 || d.blurCount > 0) && d.nextReviewTime > now)
                        .sort((a, b) => a.nextReviewTime - b.nextReviewTime);

                    let selected = [];

                    // 优先填入到期卡片，最多取 8 张，留 2 张给新卡片（避免一直复习无新进展）
                    if (duePool.length > 0) {
                        const takeDueCount = Math.min(duePool.length, 8);
                        selected.push(...duePool.slice(0, takeDueCount));
                    }

                    // 用新卡片填补至 10 张
                    if (selected.length < 10 && newPool.length > 0) {
                        const need = 10 - selected.length;
                        selected.push(...newPool.slice(0, need));
                    }

                    // 如果还是不够（可能是纯复习末期），用剩余的复习卡片或提前复习的卡片填补
                    if (selected.length < 10 && duePool.length > 8) {
                        const need = 10 - selected.length;
                        selected.push(...duePool.slice(8, 8 + need));
                    }
                    if (selected.length < 10 && futurePool.length > 0) {
                        const need = 10 - selected.length;
                        selected.push(...futurePool.slice(0, need));
                    }

                    selected = shuffleArray(selected);
                    queue.value = selected.map(item => item.text);

                    if (queue.value.length > 0) {
                        currentBlockObj.value = queue.value.shift();
                    } else {
                        currentBlockObj.value = blocks.value[0];
                    }
                };

                // --- 核心算法：SuperMemo 权重计算 ---
                const handleAnswer = async (type) => {
                    const b = currentBlock.value;
                    if (!b) return;

                    let rec = records.value[b] || { 
                        simpleCount: 0, blurCount: 0, 
                        EF: 2.5, n: 0, interval: 0, nextReviewTime: 0 
                    };

                    if (rec.EF === undefined) {
                        rec.EF = 2.5; rec.n = 0; rec.interval = 1; rec.nextReviewTime = 0;
                    }

                    const now = Date.now();

                    if (type === 'Simple') {
                        rec.simpleCount++;
                        // 相当于 SM-2 中的 Quality 5 (完美回忆)
                        if (rec.n === 0) rec.interval = 2;       // 首次记住，间隔 2 分钟
                        else if (rec.n === 1) rec.interval = 10; // 第二次记住，间隔 10 分钟
                        else rec.interval = Math.round(rec.interval * rec.EF); // 后续乘数级放大

                        rec.n++;
                        rec.EF = Math.max(1.3, rec.EF + 0.1); // 增加难度系数因子
                    } else { 
                        rec.blurCount++;
                        // 相当于 SM-2 中的 Quality 2 (模糊/答错)
                        rec.n = 0; // 连击打断
                        rec.interval = 1; // 惩罚回 1 分钟后强制复习
                        rec.EF = Math.max(1.3, rec.EF - 0.32); // 显著降低难度系数因子
                    }

                    // 计算下次复习时间戳
                    rec.lastTime = now;
                    rec.nextReviewTime = now + (rec.interval * 60 * 1000);
                    
                    records.value[b] = rec;

                    if (db.value) await saveRecordToDB(db.value, b, rec);
                    
                    pickNextBlock();
                };

                const parseText = (text) => {
                    const normalizedText = text.replace(/\r\n/g, '\n');
                    const rawBlocks = normalizedText.split(/\n\s*\n/).map(b => b.trim()).filter(b => b.length > 0);
                    const finalBlocks = [];

                    rawBlocks.forEach(block => {
                        const lines = block.split('\n');
                        if (lines.length > 20) {
                            lines.forEach(line => {
                                const trimmedLine = line.trim();
                                if (trimmedLine.length > 0) {
                                    finalBlocks.push(trimmedLine);
                                }
                            });
                        } else {
                            finalBlocks.push(block);
                        }
                    });

                    blocks.value = finalBlocks;

                    const currentSet = new Set(finalBlocks);
                    for (const key in records.value) {
                        if (!currentSet.has(key)) {
                            delete records.value[key];
                        }
                    }

                    if (db.value) {
                        cleanupDB(db.value, finalBlocks);
                    }
                    
                    queue.value = []; 
                    if (blocks.value.length > 0) pickNextBlock();
                    loading.value = false;
                    needManualUpload.value = false;
                };

                const initData = async () => {
                    db.value = await initDB();
                    records.value = await getRecordsFromDB(db.value);
                    try {
                        const res = await fetch('w.txt?_=' + Date.now(), { cache: 'no-store' });
                        if (!res.ok) throw new Error();
                        const text = await res.text();
                        parseText(text);
                    } catch (e) {
                        needManualUpload.value = true;
                        loading.value = false;
                    }
                };

                const handleFileUpload = (event) => {
                    const file = event.target.files[0];
                    if (!file) return;
                    loading.value = true;
                    const reader = new FileReader();
                    reader.onload = (e) => parseText(e.target.result);
                    reader.readAsText(file);
                };

                const speakBlock = () => {
                    if (!currentBlock.value) return;
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(currentBlock.value);
                    u.lang = 'ja-JP';
                    window.speechSynthesis.speak(u);
                };

                onMounted(() => initData());

                return {
                    loading, needManualUpload, currentBlock,
                    countClear, countBlurry, countUnread,
                    handleAnswer, handleFileUpload, speakBlock,
                    showSearch, searchQuery, searchResults, searchInput,
                    closeSearch, selectBlock, highlightText
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
